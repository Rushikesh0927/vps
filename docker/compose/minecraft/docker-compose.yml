version: '3.8'

services:
  minecraft:
    image: itzg/minecraft-server
    container_name: minecraft
    ports:
      - "25565:25565"       # Java Edition
      - "19132:19132/udp"   # Bedrock Edition (Geyser)
    environment:
      EULA: "TRUE"
      TYPE: "PAPER"
      VERSION: "1.21.1"
      MEMORY: "4G"
      MAX_PLAYERS: "10"
      MODRINTH_PROJECTS: "geyser,viaversion,viabackwards,viarewind"
      ENABLE_AUTOPAUSE: "false"
      # Aternos sometimes uses weird level names, we explicitly set it to world
      LEVEL: "world"
    volumes:
      - ./data:/data
    restart: unless-stopped
